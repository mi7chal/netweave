# On push to main: if there are feat/fix/hotfix commits since last tag, open a release PR.

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Should release?
        id: plan
        run: |
          range="HEAD"
          tag=$(git describe --tags --abbrev=0 2>/dev/null) && range="${tag}..HEAD"
          log=$(git log "$range" --pretty=format:"%s%n%b")
          if ! echo "$log" | grep -qE '^(feat|fix|hotfix)(\([^)]*\))?(!)?:'; then
            echo "releasable=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "releasable=true" >> "$GITHUB_OUTPUT"
          if echo "$log" | grep -qE 'BREAKING CHANGE|^[^:]+!:'; then
            level=major
          elif echo "$log" | grep -qE '^feat(\([^)]*\))?:'; then
            level=minor
          else
            level=patch
          fi
          echo "level=$level" >> "$GITHUB_OUTPUT"
          ver=$(grep -E '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          IFS=. read -r ma mi pa <<< "$ver"
          case "$level" in
            major) echo "new_version=$((ma+1)).0.0" >> "$GITHUB_OUTPUT" ;;
            minor) echo "new_version=${ma}.$((mi+1)).0" >> "$GITHUB_OUTPUT" ;;
            *)     echo "new_version=${ma}.${mi}.$((pa+1))" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Changelog
        if: steps.plan.outputs.releasable == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: git-cliff.toml
          args: --unreleased --tag v${{ steps.plan.outputs.new_version }} --prepend CHANGELOG.md
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Open release PR
        if: steps.plan.outputs.releasable == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          new_ver="${{ steps.plan.outputs.new_version }}"
          branch="release/v${new_ver}"

          # Skip if a release PR already exists for this version
          if gh pr list --head "${branch}" --json number --jq '.[0].number' 2>/dev/null | grep -q .; then
            echo "::notice::Release PR for v${new_ver} already exists, skipping"
            exit 0
          fi

          # Clean up stale branch from any previous failed run
          git push origin --delete "${branch}" 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${branch}"

          # Bump version in Cargo.toml, web/package.json, and compose.yaml
          sed -i "s/^version = \".*\"/version = \"${new_ver}\"/" Cargo.toml
          sed -i "s/\"version\": \".*\"/\"version\": \"${new_ver}\"/" web/package.json
          short_ver="${new_ver%.*}"  # strip patch: 0.1.3 -> 0.1
          sed -i "s|mi7chal/netweave:.*|mi7chal/netweave:${short_ver}|" compose.yaml

          git add Cargo.toml web/package.json compose.yaml CHANGELOG.md
          git commit -m "chore(release): v${new_ver}"
          git push origin "${branch}"

          # Extract this version's changelog section for PR body
          body=$(awk "/^## \[${new_ver}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md)
          pr_body=$(printf "## Release v%s\n\n%s" "${new_ver}" "${body}")

          gh pr create \
            --base main \
            --head "${branch}" \
            --title "release: v${new_ver}" \
            --body "${pr_body}"
