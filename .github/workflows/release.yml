name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"          # e.g. v0.2.0
          VERSION="${TAG#v}"                       # e.g. 0.2.0
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Detect pre-release (anything with a hyphen: 1.0.0-beta.1)
          if [[ "$VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify code versions match tag
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          CARGO_VERSION=$(grep -E '^version = "[0-9]+\.[0-9]+\.[0-9]+"' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          PKG_VERSION=$(node -e "process.stdout.write(require('./web/package.json').version)")

          echo "Git tag     : $VERSION"
          echo "Cargo.toml  : $CARGO_VERSION"
          echo "package.json: $PKG_VERSION"

          FAILED=0
          if [[ "$CARGO_VERSION" != "$VERSION" ]]; then
            echo "ERROR: Cargo.toml ($CARGO_VERSION) != tag ($VERSION)"
            FAILED=1
          fi
          if [[ "$PKG_VERSION" != "$VERSION" ]]; then
            echo "ERROR: package.json ($PKG_VERSION) != tag ($VERSION)"
            FAILED=1
          fi

          if [[ "$FAILED" == "1" ]]; then
            echo ""
            echo "Run ./scripts/bump-version.sh $VERSION , commit, then re-push the tag."
            exit 1
          fi
          echo "✓ All versions match: $VERSION"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.meta.outputs.version }}"

          # Extract everything between ## [VERSION] and the next ## [ heading
          awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" \
            CHANGELOG.md \
            | sed '/./,$!d' \
            | sed -e :a -e '/^\s*$/{$d;N;ba}' \
            > release_notes.txt

          if [[ ! -s release_notes.txt ]]; then
            echo "WARNING: No changelog entry found for [$VERSION]."
            echo "_(No changelog entry provided for this release.)_" > release_notes.txt
          fi

          echo "── Release notes preview ──────────────────────────"
          cat release_notes.txt
          echo "────────────────────────────────────────────────────"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.meta.outputs.version }}"
          PRERELEASE="${{ steps.meta.outputs.prerelease }}"

          PRERELEASE_FLAG=""
          if [[ "$PRERELEASE" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release_notes.txt \
            $PRERELEASE_FLAG
