name: Docker Publish

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  IMAGE_NAME: mi7chal/netweave

jobs:
  docker:
    name: Build & Push Multi-Arch Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches code version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep -E '^version = "[0-9]+\.[0-9]+\.[0-9]+"' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          PKG_VERSION=$(node -e "process.stdout.write(require('./web/package.json').version)")

          echo "Git tag     : $TAG_VERSION"
          echo "Cargo.toml  : $CARGO_VERSION"
          echo "package.json: $PKG_VERSION"

          FAILED=0
          [[ "$CARGO_VERSION" != "$TAG_VERSION" ]] && { echo "ERROR: Cargo.toml mismatch"; FAILED=1; }
          [[ "$PKG_VERSION"   != "$TAG_VERSION" ]] && { echo "ERROR: package.json mismatch"; FAILED=1; }
          [[ "$FAILED" == "1" ]] && { echo "Run: ./scripts/bump-version.sh $TAG_VERSION"; exit 1; }
          echo "✓ All versions match: $TAG_VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
