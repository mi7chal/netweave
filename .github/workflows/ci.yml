name: CI

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check versions (Cargo/package full, compose major.minor)
        run: |
          CARGO_VERSION=$(grep -E '^version = "[0-9]+\.[0-9]+\.[0-9]+"' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          PKG_VERSION=$(node -e "process.stdout.write(require('./web/package.json').version)")
          COMPOSE_VERSION=$(grep -E 'image: .*/netweave:' compose.yaml | head -1 | sed 's/.*:\(.*\)/\1/')
          CARGO_MINOR_VERSION=$(sed -E 's/^([0-9]+\.[0-9]+)\.[0-9]+$/\1/' <<< "$CARGO_VERSION")

          echo "Cargo.toml  : $CARGO_VERSION"
          echo "package.json: $PKG_VERSION"
          echo "compose.yaml: $COMPOSE_VERSION"

          if [[ "$CARGO_VERSION" != "$PKG_VERSION" ]]; then
            echo ""
            echo "ERROR: version mismatch (Cargo.toml vs package.json)!"
            echo "  Keep them synced via release-plz (release-pr/update flow)."
            exit 1
          fi

          if [[ "$CARGO_MINOR_VERSION" != "$COMPOSE_VERSION" ]]; then
            echo ""
            echo "ERROR: version mismatch (Cargo major.minor vs compose.yaml)!"
            echo "  Expected: $CARGO_MINOR_VERSION"
            echo "  Found:    $COMPOSE_VERSION"
            exit 1
          fi

          echo "✓ Versions match:"
          echo "  Cargo/package : $CARGO_VERSION"
          echo "  compose.yaml  : $COMPOSE_VERSION (from Cargo $CARGO_MINOR_VERSION)"

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Lint
        run: pnpm lint
        working-directory: web

      - name: Build
        run: pnpm build
        working-directory: web
