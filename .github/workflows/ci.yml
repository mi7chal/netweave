name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      version: ${{ steps.filter.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'src/**'
              - 'tests/**'
              - 'migrations/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
            frontend:
              - 'web/**'
            version:
              - 'Cargo.toml'
              - 'web/package.json'
              - 'compose.yaml'

  backend:
    name: Backend (Rust + Integration + Audit)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: netweave_test
          POSTGRES_USER: netweave
          POSTGRES_PASSWORD: netweave
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U netweave -d netweave_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://netweave:netweave@localhost:5432/netweave_test
      DEFAULT_ADMIN_USER: integration-admin
      DEFAULT_ADMIN_PASSWORD: integration-admin-password
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Run ignored integration tests
        run: cargo test --test api -- --ignored

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run dependency audit
        run: cargo audit

  version-check:
    name: Version Consistency
    needs: changes
    if: needs.changes.outputs.version == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check versions (Cargo/package full, compose major.minor)
        run: |
          CARGO_VERSION=$(grep -E '^version = "[0-9]+\.[0-9]+\.[0-9]+"' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          PKG_VERSION=$(node -e "process.stdout.write(require('./web/package.json').version)")
          COMPOSE_VERSION=$(grep -E 'image: .*/netweave:' compose.yaml | head -1 | sed 's/.*:\(.*\)/\1/')
          CARGO_MINOR_VERSION=$(sed -E 's/^([0-9]+\.[0-9]+)\.[0-9]+$/\1/' <<< "$CARGO_VERSION")

          echo "Cargo.toml  : $CARGO_VERSION"
          echo "package.json: $PKG_VERSION"
          echo "compose.yaml: $COMPOSE_VERSION"

          if [[ "$CARGO_VERSION" != "$PKG_VERSION" ]]; then
            echo ""
            echo "ERROR: version mismatch (Cargo.toml vs package.json)!"
            echo "  Keep them synced via release-plz (release-pr/update flow)."
            exit 1
          fi

          if [[ "$CARGO_MINOR_VERSION" != "$COMPOSE_VERSION" ]]; then
            echo ""
            echo "ERROR: version mismatch (Cargo major.minor vs compose.yaml)!"
            echo "  Expected: $CARGO_MINOR_VERSION"
            echo "  Found:    $COMPOSE_VERSION"
            exit 1
          fi

          echo "✓ Versions match:"
          echo "  Cargo/package : $CARGO_VERSION"
          echo "  compose.yaml  : $COMPOSE_VERSION (from Cargo $CARGO_MINOR_VERSION)"

  frontend:
    name: Frontend (React)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Lint
        run: pnpm lint
        working-directory: web

      - name: Test
        run: pnpm test --run
        working-directory: web

      - name: Build
        run: pnpm build
        working-directory: web
