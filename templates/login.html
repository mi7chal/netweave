<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Login - Homelab Manager</title>
        <link rel="stylesheet" href="/assets/style.css" />

        <style>
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background-color: #f5f5f5;
                margin: 0 !important;
                max-width: initial;
            }
            .login-container {
                background: white;
                padding: 2rem;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                width: 100%;
                max-width: 400px;
            }
            h1 {
                margin-top: 0;
                text-align: center;
            }
            .alert.error {
                background: #ffebee;
                color: #c62828;
                padding: 10px;
                border-radius: 4px;
                margin-bottom: 20px;
                border: 1px solid #ef9a9a;
                font-size: 0.9em;
            }
            .form-group label {
                display: block;
                margin-bottom: 5px;
                font-weight: bold;
            }
            .form-group input {
                width: 100%;
                padding: 8px;
                border: 1px solid #ccc;
                border-radius: 4px;
                box-sizing: border-box;
            }
            .form-group + .form-group {
                margin-top: 15px;
            }
            .form-actions {
                margin-top: 25px;
            }
            .btn.primary {
                width: 100%;
                padding: 10px;
                background-color: #007bff;
                color: white;
                border: none;
                border-radius: 4px;
                font-size: 1em;
                cursor: pointer;
            }
            .btn.primary:hover {
                background-color: #0056b3;
            }
        </style>
    </head>
    <body>
        <div class="login-container">
            <h1>Homelab Manager</h1>

            {% if let Some(error) = error %}
            <div class="alert error">{{ error }}</div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" />
                </div>

                <div class="form-group" style="margin-top: 15px">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" />
                </div>

                <div class="form-actions" style="margin-top: 25px">
                    <button type="submit" class="btn primary">Sign In</button>
                </div>
            </form>
        </div>
    </body>
</html>
